services:
    api:
        build: .
        ports:
            - '8000:8000'
            - '9092:9092' # AudioSocket TCP server
            - '9093:9093' # WebSocket server (chan_websocket)
        volumes:
            - ./app:/app/app
            - ./resources:/app/resources
        env_file:
            - .env
        environment:
            - REDIS_URL=redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0
            - ASTERISK_AMI_HOST=asterisk
            - ASTERISK_AMI_PORT=5038
            - ASTERISK_AMI_USER=tito
            - ASTERISK_AMI_SECRET=${ASTERISK_AMI_SECRET:-changeme}
            - SIP_AUDIOSOCKET_HOST=0.0.0.0
            - SIP_AUDIOSOCKET_PORT=9092
            - SIP_ENABLED=${SIP_ENABLED:-false}
            - SIP_TRANSPORT=${SIP_TRANSPORT:-audiosocket}
            - ASTERISK_ARI_HOST=asterisk
            - ASTERISK_ARI_PORT=8088
            - ASTERISK_ARI_USER=${ASTERISK_ARI_USER:-tito-ai}
            - ASTERISK_ARI_PASSWORD=${ASTERISK_ARI_PASSWORD:-tito-ari-secret}
            - ASTERISK_ARI_APP=${ASTERISK_ARI_APP:-tito-ai}
        command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped

    asterisk:
        image: andrius/asterisk:alpine-20
        ports:
            - '5060:5060/udp' # SIP signaling
            - '5060:5060/tcp'
            - '8088:8088' # ARI HTTP + WebSocket
            - '10000-10099:10000-10099/udp' # RTP media
        volumes:
            - ./config/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
            - ./config/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
            - ./config/asterisk/manager.conf:/etc/asterisk/manager.conf:ro
            - ./config/asterisk/modules.conf:/etc/asterisk/modules.conf:ro
            - ./config/asterisk/logger.conf:/etc/asterisk/logger.conf:ro
            - ./config/asterisk/ari.conf:/etc/asterisk/ari.conf:ro
            - ./config/asterisk/http.conf:/etc/asterisk/http.conf:ro
            - ./config/asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
        environment:
            - ASTERISK_AMI_USER=tito
            - ASTERISK_AMI_SECRET=${ASTERISK_AMI_SECRET:-changeme}
        profiles:
            - sip # Only starts with: docker compose --profile sip up
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        healthcheck:
            test:
                [
                    'CMD',
                    'redis-cli',
                    '-a',
                    '${REDIS_PASSWORD:-redissecret}',
                    'ping',
                ]
            interval: 10s
            timeout: 5s
            retries: 3
        restart: unless-stopped

volumes:
    redis_data:
