; ============================================================================
; Asterisk WebSocket Client Configuration
; ============================================================================
; Used by ARI ExternalMedia with transport=websocket.
; When tito_ari_manager creates an ExternalMedia channel (external_host=tito-ari),
; Asterisk opens a WebSocket to the URI defined below.
;
; connection_type=per_call_config allows tito_ari_manager to override the
; base URI per-call via the ARI 'data' field.

[tito-ari]
type = websocket_client
uri = ws://pipecat-runners-api:8000/api/v1/sip/ari/audio
protocols = sip
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 500
reconnect_attempts = 3
tls_enabled = no
