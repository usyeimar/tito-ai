; ============================================================================
; Asterisk WebSocket Client Configuration for Tito AI
; ============================================================================
; chan_websocket uses this to connect to our WebSocket server.
; Used when SIP_TRANSPORT=websocket (dialplan context tito-inbound-ws).

[tito-media]
type = websocket_client
uri = ws://pipecat-runners-api:9093/media/asterisk
protocols = media
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 500
reconnect_attempts = 3
tls_enabled = no

; ARI ExternalMedia WebSocket connection
; Asterisk connects HERE when ExternalMedia transport=websocket, external_host=tito-ari
[tito-ari]
type = websocket_client
uri = ws://pipecat-runners-api:8000/api/v1/sip/ari/audio
protocols = sip
connection_type = per_call_config
connection_timeout = 5000
reconnect_interval = 500
reconnect_attempts = 3
tls_enabled = no
