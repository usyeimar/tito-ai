; ============================================================================
; Asterisk ARI Configuration for Tito AI
; ============================================================================
; ARI provides REST API + WebSocket event stream for full call control.
; Used when SIP_TRANSPORT=ari is configured.

[general]
enabled = yes
; Allow connections from the runner container
allowed_origins = *

[tito-ai]
type = user
password = tito-ari-secret
read_only = no
