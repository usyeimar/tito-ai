; =============================================================================
; Asterisk Configuration for Tito ARI + WebSocket Integration
; =============================================================================
; This configuration replaces AudioSocket with ARI + ExternalMedia WebSocket
; =============================================================================

; -----------------------------------------------------------------------------
; ari.conf - ARI Configuration
; -----------------------------------------------------------------------------
[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088

[tito-ai]
type = user
password = tito-ari-secret
read = system,call,log,verbose,command,agent,user,config,originate,playback
write = system,call,log,verbose,command,agent,user,config,originate,playback

; -----------------------------------------------------------------------------
; http.conf - HTTP Server for ARI
; -----------------------------------------------------------------------------
[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088

[tito]
enabled = yes

; -----------------------------------------------------------------------------
; extensions.conf - Dialplan
; -----------------------------------------------------------------------------
[tito-inbound]
; Inbound calls enter Stasis app
; Format: Stasis(app_name, extension, caller_id)
exten => _X.,1,NoOp(Inbound call to ${EXTEN} from ${CALLERID(num)})
same => n,Stasis(tito-ai,${EXTEN},${CALLERID(num)})
same => n,Hangup()

[tito-outbound]
; Outbound calls (for click-to-call)
exten => _X.,1,NoOp(Outbound call to ${EXTEN})
same => n,Stasis(tito-ai,outbound,${CALLERID(num)})
same => n,Hangup()

; -----------------------------------------------------------------------------
; pjsip.conf - SIP Configuration
; -----------------------------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; Template for SIP endpoints
tito-endpoint-template]
type=endpoint
transport=transport-udp
context=tito-inbound
disallow=all
allow=ulaw,alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

; Example trunk endpoint (configure as needed)
[tito-trunk](tito-endpoint-template)
auth=tito-trunk
aors=tito-trunk

[tito-trunk]
type=auth
auth_type=userpass
username=tito-trunk
password=change-me-in-production

[tito-trunk]
type=aor
max_contacts=10

; -----------------------------------------------------------------------------
; modules.conf - Required Modules
; -----------------------------------------------------------------------------
[modules]
autoload=yes

; Required for ARI
preload => res_ari.so
preload => res_ari_channels.so
preload => res_ari_bridges.so
preload => res_ari_applications.so

; Required for ExternalMedia with WebSocket
preload => res_http_websocket.so
preload => chan_websocket.so

; -----------------------------------------------------------------------------
; websocket.conf - WebSocket Configuration (if needed)
; -----------------------------------------------------------------------------
; Note: chan_websocket is configured via externalMedia in ARI
; No additional config needed here
