[general]
rtpstart=10000
rtpend=10100

; Keep NAT alive - send RTP keepalives every 15 seconds
; This is critical for WSL/Docker NAT environments
rtpkeepalive=15

; Enable ICE for better NAT traversal
icesupport=yes

; Bind to all interfaces for Docker/WSL compatibility
rtpbindaddr=0.0.0.0

; Debugging (enable if needed)
; rtcpdebug=yes
; rtcpstats=yes
