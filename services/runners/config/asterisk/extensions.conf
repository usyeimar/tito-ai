; ============================================================================
; Asterisk Dialplan for Tito AI SIP Bridge
; ============================================================================
; Two transport modes supported. The active context is selected in
; pjsip.conf (endpoint -> context):
;
;   1. AudioSocket (app_audiosocket)   → tito-inbound / tito-outbound
;   2. ARI + Stasis + ExternalMedia WS → tito-inbound-ari / tito-outbound-ari

[general]
static=yes
writeprotect=no

; ── AudioSocket (simple, TCP, no call control) ───────────────────────────────
; Audio is sent/received directly over TCP to pipecat-runners-api:9092.
; UUID must be a valid RFC-4122 UUID.

[tito-inbound]
exten => _X.,1,NoOp(AudioSocket Inbound call to ${EXTEN} from ${CALLERID(num)})
 same => n,Set(AGENT_ID=${EXTEN})
 same => n,Set(UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Answer()
 same => n,AudioSocket(${UUID},pipecat-runners-api:9092)
 same => n,Hangup()

[tito-outbound]
exten => s,1,NoOp(AudioSocket Outbound call CALL_ID=${CALL_ID} AGENT_ID=${AGENT_ID})
 same => n,Set(UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Answer()
 same => n,AudioSocket(${UUID},pipecat-runners-api:9092)
 same => n,Hangup()

; ── ARI + Stasis (full call control, ExternalMedia WebSocket audio) ─────────
; TitoARIManager handles StasisStart, creates an ExternalMedia channel with
; transport=websocket, and Asterisk connects back to
; ws://pipecat-runners-api:8000/api/v1/sip/ari/audio for bidirectional audio.

[tito-inbound-ari]
exten => _X.,1,NoOp(ARI Inbound call to ${EXTEN} from ${CALLERID(num)})
 same => n,Stasis(tito-ai,${EXTEN},${CALLERID(num)})
 same => n,Hangup()

[tito-outbound-ari]
exten => s,1,NoOp(ARI Outbound call)
 same => n,Stasis(tito-ai,outbound,${CALL_ID},${AGENT_ID})
 same => n,Hangup()
