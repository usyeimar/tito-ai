; ============================================================================
; Asterisk Dialplan for Tito AI SIP Bridge
; ============================================================================
; Three transport modes supported:
;   1. AudioSocket (app_audiosocket) - Direct TCP, simplest
;   2. WebSocket (chan_websocket)    - Asterisk 20.18+
;   3. ARI + Stasis                 - Full call control via REST API
;
; The active context is selected in pjsip.conf endpoint -> context

[general]
static=yes
writeprotect=no

; ── Inbound Context: AudioSocket ─────────────────────────────────────────────
; Uses app_audiosocket: the channel audio is sent/received directly over TCP.
; UUID must be a valid RFC-4122 UUID (not Asterisk uniqueid).

[tito-inbound]
exten => _X.,1,NoOp(Inbound call to ${EXTEN} from ${CALLERID(num)})
 same => n,Set(AGENT_ID=${EXTEN})
 same => n,Set(UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Answer()
 same => n,AudioSocket(${UUID},pipecat-runners-api:9092)
 same => n,Hangup()

; ── Outbound Context: AudioSocket ────────────────────────────────────────────

[tito-outbound]
exten => s,1,NoOp(Outbound call CALL_ID=${CALL_ID} AGENT_ID=${AGENT_ID})
 same => n,Set(UUID=${SHELL(cat /proc/sys/kernel/random/uuid | tr -d '\n')})
 same => n,Answer()
 same => n,AudioSocket(${UUID},pipecat-runners-api:9092)
 same => n,Hangup()

; ── Inbound Context: WebSocket (chan_websocket) ──────────────────────────────
; Uses chan_websocket: Asterisk connects to our WS server as a client.
; slin16 codec avoids transcoding. 3600s timeout = 1 hour max.

[tito-inbound-ws]
exten => _X.,1,NoOp(WebSocket Inbound call to ${EXTEN} from ${CALLERID(num)})
 same => n,Set(AGENT_ID=${EXTEN})
 same => n,Answer()
 same => n,Dial(WebSocket/tito-media/c(slin16),3600)
 same => n,Hangup()

; ── Outbound Context: WebSocket ──────────────────────────────────────────────

[tito-outbound-ws]
exten => s,1,NoOp(WebSocket Outbound call)
 same => n,Answer()
 same => n,Dial(WebSocket/tito-media/c(slin16),3600)
 same => n,Hangup()

; ── Inbound Context: ARI + Stasis ────────────────────────────────────────────
; Sends the call to Stasis app "tito-ai". The Python ARI client takes over.

[tito-inbound-ari]
exten => _X.,1,NoOp(ARI Inbound call to ${EXTEN} from ${CALLERID(num)})
 same => n,Stasis(tito-ai,${EXTEN},${CALLERID(num)})
 same => n,Hangup()

; ── Outbound Context: ARI ────────────────────────────────────────────────────

[tito-outbound-ari]
exten => s,1,NoOp(ARI Outbound call)
 same => n,Stasis(tito-ai,outbound,${CALL_ID},${AGENT_ID})
 same => n,Hangup()
