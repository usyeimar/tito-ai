services:
    app.tito.ai:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        env_file:
            - '.env'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis

    reverb:
        image: 'sail-8.5/app'
        command: php artisan reverb:start --host=${REVERB_SERVER_HOST:-0.0.0.0} --port=${REVERB_SERVER_PORT:-8080}
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        restart: unless-stopped
        depends_on:
            - app.tito.ai
            - redis
        networks:
            - sail

    nginx:
        image: 'nginx:1.27-alpine'
        ports:
            - '${APP_PORT:-80}:80'
            - '${APP_SSL_PORT:-443}:443'
        volumes:
            - './docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
            - './.certs:/etc/nginx/certs:ro'
        depends_on:
            - app.tito.ai
            - reverb
        networks:
            - sail

    queue:
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        restart: unless-stopped
        networks:
            - sail
        depends_on:
            - app.tito.ai
            - redis

    queue-imports:
        image: 'sail-8.5/app'

        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        command: php artisan queue:work --queue=imports --sleep=3 --tries=1 --max-time=3600 --timeout=1800
        restart: unless-stopped
        networks:
            - sail
        depends_on:
            - app.tito.ai
            - redis

    scheduler:
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        command: php artisan schedule:work
        restart: unless-stopped
        networks:
            - sail
        depends_on:
            - app.tito.ai
            - redis

    pgsql:
        image: 'pgvector/pgvector:pg17'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_USER: '${DB_USERNAME:-postgres}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE:-laravel}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        command: >
            --requirepass ${REDIS_PASSWORD:-redissecret}
            --appendonly yes
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                [
                    'CMD',
                    'redis-cli',
                    '-a',
                    '${REDIS_PASSWORD:-redissecret}',
                    'ping',
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    typesense:
        image: 'typesense/typesense:28.0'
        ports:
            - '${FORWARD_TYPESENSE_PORT:-8108}:8108'
        environment:
            TYPESENSE_API_KEY: '${TYPESENSE_API_KEY:-xyz}'
            TYPESENSE_DATA_DIR: /data
        volumes:
            - 'sail-typesense:/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://127.0.0.1:8108/health']
            interval: 10s
            timeout: 5s
            retries: 3

    rustfs:
        image: 'rustfs/rustfs:latest'
        ports:
            - '${FORWARD_RUSTFS_PORT:-9002}:9000'
            - '${FORWARD_RUSTFS_CONSOLE_PORT:-9003}:9001'
        environment:
            RUSTFS_VOLUMES: /data
            RUSTFS_ADDRESS: '0.0.0.0:9000'
            RUSTFS_CONSOLE_ADDRESS: '0.0.0.0:9001'
            RUSTFS_EXTERNAL_ADDRESS: ':9000'
            RUSTFS_ACCESS_KEY: sail
            RUSTFS_SECRET_KEY: password
        volumes:
            - 'sail-rustfs:/data'
        networks:
            - sail

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

    gotenberg:
        image: 'gotenberg/gotenberg:8'
        ports:
            - '${FORWARD_GOTENBERG_PORT:-3000}:3000'
        networks:
            - sail

    coturn:
        image: 'coturn/coturn:latest'
        ports:
            - '${FORWARD_COTURN_PORT:-3478}:3478'
            - '${FORWARD_COTURN_TLS_PORT:-5349}:5349'
        environment:
            TURN_SERVER_NAME: '${COTURN_DOMAIN:-localhost}'
            TURN_SERVER_REALM: '${COTURN_REALM:-laravel}'
            TURN_SERVER_USER: '${COTURN_USER:-admin}'
            TURN_SERVER_PASSWORD: '${COTURN_PASSWORD:-secret}'
        volumes:
            - 'sail-coturn:/var/lib/coturn'
        networks:
            - sail

    cloudflared:
        image: 'cloudflare/cloudflared:latest'
        ports:
            - '${FORWARD_TUNNEL_PORT:-8080}:8080'
        environment:
            TUNNEL_TOKEN: '${CLOUDFLARED_TOKEN:-}'
            TUNNEL_NAME: '${CLOUDFLARED_NAME:-laravel}'
        command: tunnel run
        networks:
            - sail

    pipecat-runners-api:
        build:
            context: './services/runners'
            dockerfile: Dockerfile
        image: 'pipecat-runners:latest'
        ports:
            - '8000:8000'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
            - 'app.tito.ai:host-gateway'
            - 'alloy-finance.app.tito.ai:host-gateway'
        environment:
            REDIS_URL: 'redis://:${REDIS_PASSWORD:-redissecret}@redis:6379/0'
            LIVEKIT_URL: '${LIVEKIT_URL:-}'
            LIVEKIT_API_KEY: '${LIVEKIT_API_KEY:-}'
            LIVEKIT_API_SECRET: '${LIVEKIT_API_SECRET:-}'
            OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
            ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
            DEEPGRAM_API_KEY: '${DEEPGRAM_API_KEY:-}'
            CARTESIA_API_KEY: '${CARTESIA_API_KEY:-}'
            SIP_ENABLED: 'true'
            SIP_TRANSPORT: '${SIP_TRANSPORT:-audiosocket}'
            ASTERISK_AMI_HOST: 'asterisk'
            ASTERISK_AMI_PORT: '5038'
            ASTERISK_AMI_USER: 'tito'
            ASTERISK_AMI_SECRET: 'tito'
            ASTERISK_ARI_HOST: 'asterisk'
            ASTERISK_ARI_PORT: '8088'
            ASTERISK_ARI_USER: '${ASTERISK_ARI_USER:-tito-ai}'
            ASTERISK_ARI_PASSWORD: '${ASTERISK_ARI_PASSWORD:-tito-ari-secret}'
            ASTERISK_ARI_APP: '${ASTERISK_ARI_APP:-tito-ai}'
        volumes:
            - './services/runners/app:/app/app'
        env_file:
            - '.env'
        networks:
            - sail
        depends_on:
            redis:
                condition: service_healthy

    asterisk:
        image: andrius/asterisk:latest
        container_name: apptitoai-asterisk
        ports:
            - '5060:5060/udp'
            - '5060:5060/tcp'
            - '8088:8088'
            - '10000-10100:10000-10100/udp'
        volumes:
            - ./services/runners/config/asterisk:/etc/asterisk:ro
            - asterisk-data:/var/lib/asterisk
            - asterisk-log:/var/log/asterisk
        environment:
            - ASTERISK_UID=1000
            - ASTERISK_GID=1000
        networks:
            - sail
        depends_on:
            pipecat-runners-api:
                condition: service_started
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'asterisk', '-rx', 'core show version']
            interval: 30s
            timeout: 10s
            retries: 3

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-typesense:
        driver: local
    sail-rustfs:
        driver: local
    sail-coturn:
        driver: local
    sail-langfuse:
        driver: local
    sail-pipecat:
        driver: local
    asterisk-data:
        driver: local
    asterisk-log:
        driver: local
